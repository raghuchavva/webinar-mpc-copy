<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webinar Registration</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 440px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      padding: 32px 28px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      color: #1a1a2e;
      text-align: center;
    }
    p.sub {
      margin: 0 0 24px;
      font-size: 14px;
      color: #6b7280;
      text-align: center;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin: 14px 0 6px;
    }
    input {
      width: 100%;
      padding: 11px 13px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #667eea;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #5568d3; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }
    .msg.error { color: #dc2626; }
    .msg.ok { color: #059669; }
    #alreadyRegistered { display: none; text-align: center; }
    #alreadyRegistered h2 { font-size: 20px; color: #1a1a2e; margin: 0 0 8px; }
    #alreadyRegistered p { font-size: 14px; color: #6b7280; margin: 0 0 20px; }
    .btn-ghost { display: inline-block; margin-top: 14px; font-size: 13px; color: #9ca3af;
      cursor: pointer; background: none; border: none; width: auto; padding: 0;
      text-decoration: underline; }
    .btn-ghost:hover { color: #6b7280; background: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Webinar Registration</h1>
    <p class="sub">Fill in your details to join the live session.</p>

    <form id="regForm">
      <label for="parentName">Parent Name</label>
      <input type="text" id="parentName" name="parentName" required />

      <label for="parent Mobile Number">Parent Mobile Number</label>
      <input type="tel" id="parent Mobile Number" name="parentNumber" required
             pattern="[0-9+\-\s]{7,15}" title="Enter a valid phone number" />

      <label for="studentName">Student Name</label>
      <input type="text" id="studentName" name="studentName" required />

      <label for="student Mobile Number">Student Number <span style="font-weight:400;color:#9ca3af;">(optional)</span></label>
      <input type="tel" id="studentNumber" name="studentNumber"
             pattern="[0-9+\-\s]{7,15}" title="Enter a valid phone number" />

      <button type="submit" id="submitBtn">Proceed to Webinar</button>
      <div class="msg" id="msg"></div>
    </form>

    <div id="alreadyRegistered">
      <h2>You're already registered!</h2>
      <p>Welcome back, <strong id="regName"></strong>.</p>
      <button type="button" id="joinBtn">Join Meeting</button>
      <br>
      <button type="button" class="btn-ghost" id="notYouBtn">Not you? Register with different details</button>
    </div>
  </div>

  <script>
    // ====================================================================
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW (see README.md)
    // ====================================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqmbheaWVeqeMLdiB7RPJjMYuSOuNiDZMVW1nlV9uY5TwACRceK1b_Ss6Ol4h5q7W9-A/exec";
    // ====================================================================

    const form = document.getElementById("regForm");
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");
    const STORAGE_KEY = "webinar_reg";

    // If already registered on this device, skip the form entirely.
    (function checkExisting() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const reg = JSON.parse(saved);
        form.style.display = "none";
        document.querySelector(".sub").style.display = "none";
        document.getElementById("regName").textContent = reg.parentName || "there";
        document.getElementById("alreadyRegistered").style.display = "block";
      } catch (e) {
        localStorage.removeItem(STORAGE_KEY);
      }
    })();

    document.getElementById("joinBtn").addEventListener("click", async () => {
      const link = meetLink || await fetch(SCRIPT_URL, { method: "GET" })
        .then((r) => r.json()).then((d) => d.meetLink).catch(() => null);
      if (link) window.location.href = link;
    });

    document.getElementById("notYouBtn").addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    });

    // Pre-fetch the (dynamic) Meet link while the user fills the form,
    // so that on submit we can redirect instantly without waiting.
    let meetLink = null;
    if (!SCRIPT_URL.includes("PASTE_YOUR")) {
      fetch(SCRIPT_URL, { method: "GET" })
        .then((r) => r.json())
        .then((d) => { if (d && d.meetLink) meetLink = d.meetLink; })
        .catch(() => { /* fall back to fetching it on submit */ });
    }

    function buildData() {
      return {
        parentName: form.parentName.value.trim(),
        parentNumber: form.parentNumber.value.trim(),
        studentName: form.studentName.value.trim(),
        studentNumber: form.studentNumber.value.trim(),
      };
    }

    // Fire the save without waiting. `keepalive` lets the request finish
    // even after the page navigates away to Google Meet.
    function saveInBackground(data) {
      return fetch(SCRIPT_URL, {
        method: "POST",
        keepalive: true,
        // text/plain avoids a CORS preflight against Apps Script
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data),
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      msg.className = "msg";

      if (SCRIPT_URL.includes("PASTE_YOUR")) {
        msg.textContent = "Setup incomplete: add your Web App URL in index.html.";
        msg.classList.add("error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Joining your webinar…";
      msg.textContent = "Joining your webinar…";
      msg.classList.add("ok");

      const data = buildData();

      // FAST PATH: link already loaded -> save in background, redirect now.
      if (meetLink) {
        saveInBackground(data).catch(() => {});
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ parentName: data.parentName, parentNumber: data.parentNumber, studentName: data.studentName, timestamp: new Date().toISOString() }));
        window.location.href = meetLink;
        return;
      }

      // FALLBACK: link not loaded yet -> wait for the save response,
      // which also returns the Meet link.
      try {
        const res = await saveInBackground(data);
        const result = await res.json();
        if (result.meetLink) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ parentName: data.parentName, parentNumber: data.parentNumber, studentName: data.studentName, timestamp: new Date().toISOString() }));
          window.location.href = result.meetLink;
        } else {
          throw new Error(result.message || "No webinar link configured.");
        }
      } catch (err) {
        msg.textContent = "Something went wrong: " + err.message;
        msg.className = "msg error";
        btn.disabled = false;
        btn.textContent = "Proceed to Webinar";
      }
    });
  </script>
</body>
</html>
